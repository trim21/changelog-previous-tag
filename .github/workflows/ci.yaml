name: ci

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm exec prettier --check .

name: autofix.ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: autofix-ci/action@v1
